{% extends "base.html" %}
{% block body %}
<main class="gate-page">
  <div class="gate-card" data-aos="fade-up">
    <div class="gate-monogram">Admin</div>
    <h1 class="gate-title">Tableau de bord</h1>
    <p class="gate-subtitle">Accès réservé aux mariés.</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <p class="gate-error">{{ message }}</p>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="{{ url_for('admin_login_post') }}" class="gate-form">
      <input
        type="password"
        name="password"
        placeholder="Mot de passe admin"
        class="gate-input"
        autocomplete="off"
        required
        autofocus
      />
      <button type="submit" class="btn btn-primary gate-btn">Accéder</button>
    </form>
  </div>
</main>
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>AOS.init();</script>
{% endblock %}
